<ion-content [fullscreen]="true" class="login-content">
  <div class="login-screen">
    <ion-button
      fill="clear"
      class="brand-back-btn"
      routerLink="/onboarding"
      routerDirection="back"
      aria-label="Voltar para onboarding"
    >
      <ion-icon name="chevron-back-outline" class="back-icon"></ion-icon>
    </ion-button>

    <h1>Acessar minha conta</h1>

    <form class="form">
      <div class="field">
        <label for="documento">Documento de acesso</label>
        <ion-input
          id="documento"
          name="loginUser"
          type="text"
          [(ngModel)]="loginUser"
          fill="clear"
          class="line-input"
        ></ion-input>
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <div class="password-row">
          <ion-input
            id="senha"
            [type]="showPassword ? 'text' : 'password'"
            name="loginPassword"
            [(ngModel)]="loginPassword"
            placeholder="Digite sua senha"
            fill="clear"
            class="line-input"
          ></ion-input>
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'"
          >
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </div>

      <div class="meta-row">
        <label class="remember">
          <ion-checkbox labelPlacement="end"></ion-checkbox>
          <span>Me Lembrar</span>
        </label>
        <button type="button" class="forgot">Esqueci minha senha</button>
      </div>

      <ion-button expand="block" class="access-btn" type="button" (click)="onAccess()">
        Acessar
      </ion-button>

      <div
        class="login-bio-feedback"
        [class.login-bio-feedback--error]="biometricFeedbackError"
        aria-live="polite"
      >
        <ion-icon name="finger-print-outline" class="login-bio-icon" aria-hidden="true"></ion-icon>
        <p class="login-biometric-hint">
          O acesso só continua após confirmar com Face ID ou digital no dispositivo.
        </p>
      </div>
    </form>
  </div>
</ion-content>
