<!-- QR e chaves PIX via GET/POST wallet-accout -->
<ion-content [fullscreen]="true" class="depositar-content" [forceOverscroll]="false">
  <div class="dep-page">
    <button type="button" class="dep-back tap-highlight-none" (click)="goBack()" aria-label="Voltar">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </button>

    <header class="dep-header">
      <div class="dep-qr-wrap" aria-hidden="true">
        <ng-container *ngIf="loading">
          <ion-spinner name="crescent" class="dep-qr-spinner"></ion-spinner>
        </ng-container>

        <ng-container *ngIf="!loading && qrImageSrc">
          <img class="dep-qr-image" [src]="qrImageSrc" alt="QR Code PIX" />
        </ng-container>

        <div class="dep-qr-placeholder" *ngIf="!loading && !qrImageSrc">
          <ion-icon name="qr-code-outline" class="dep-qr-placeholder-icon"></ion-icon>
          <p class="dep-qr-missing" *ngIf="!errorMessage">QR Code não disponível.</p>
        </div>
      </div>

      <h1 class="dep-title">Use o QR code no seu app bancário</h1>

      <p class="dep-account-hint" *ngIf="accountName || accountAgency || accountNumber">
        <span *ngIf="accountName">{{ accountName }}</span>
        <span *ngIf="accountAgency || accountNumber" class="dep-account-numbers">
          <ng-container *ngIf="accountAgency">Ag. {{ accountAgency }}</ng-container>
          <ng-container *ngIf="accountAgency && accountNumber"> · </ng-container>
          <ng-container *ngIf="accountNumber">Conta {{ accountNumber }}</ng-container>
        </span>
      </p>
    </header>

    <main class="dep-sheet">
      <p class="dep-error" *ngIf="errorMessage" role="alert">{{ errorMessage }}</p>

      <h2 class="dep-sheet-title">Suas chaves PIX</h2>

      <div
        class="dep-sheet-scroll"
        role="region"
        aria-label="Lista de chaves PIX"
        *ngIf="pixKeys.length > 0"
      >
        <div class="dep-key-block" *ngFor="let key of pixKeys; let i = index">
          <p class="dep-key-label">Chave PIX #{{ i + 1 }}</p>
          <button type="button" class="dep-key-row tap-highlight-none" (click)="copyKey(key)">
            <span class="dep-key-value">{{ key }}</span>
            <img
              class="dep-copy-icon"
              src="https://storage.googleapis.com/uxpilot-auth.appspot.com/PpDwGQ71w5RZv155vdRkzs78Kdu1/Frame427319583-1b354426-a2af-4963-b399-c33ebb04539c.svg"
              alt=""
            />
          </button>
        </div>
      </div>

      <p class="dep-empty-keys" *ngIf="!loading && !errorMessage && pixKeys.length === 0">
        Nenhuma chave PIX cadastrada para esta conta.
      </p>

      <button
        type="button"
        class="dep-primary-btn tap-highlight-none"
        [disabled]="creatingPixKey || loading"
        (click)="onCreateNewKey()"
      >
        <span>{{ creatingPixKey ? 'Criando…' : 'Criar nova chave PIX' }}</span>
      </button>
    </main>
  </div>
</ion-content>
