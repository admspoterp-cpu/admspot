<!-- Depositar: QR fixo no topo · chaves PIX scrolláveis no centro · CTA fixo no footer -->
<ion-content [fullscreen]="true" [scrollY]="false" class="depositar-content" [forceOverscroll]="false">
  <div class="dep-page">
    <button type="button" class="dep-back tap-highlight-none" (click)="goBack()" aria-label="Voltar">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </button>

    <!-- TOPO FIXO -->
    <header class="dep-header">
      <div class="dep-qr-wrap" aria-hidden="true">
        <ng-container *ngIf="loading">
          <ion-spinner name="crescent" class="dep-qr-spinner"></ion-spinner>
        </ng-container>

        <ng-container *ngIf="!loading && qrImageSrc">
          <img class="dep-qr-image" [src]="qrImageSrc" alt="QR Code PIX" />
        </ng-container>

        <div class="dep-qr-placeholder" *ngIf="!loading && !qrImageSrc">
          <ion-icon name="qr-code-outline" class="dep-qr-placeholder-icon"></ion-icon>
          <p class="dep-qr-missing" *ngIf="!errorMessage">QR Code não disponível.</p>
        </div>
      </div>

      <h1 class="dep-title">Use o QR code no seu app bancário</h1>

      <p class="dep-account-hint" *ngIf="accountName || accountAgency || accountNumber">
        <span *ngIf="accountName">{{ accountName }}</span>
        <span *ngIf="accountAgency || accountNumber" class="dep-account-numbers">
          <ng-container *ngIf="accountAgency">Ag. {{ accountAgency }}</ng-container>
          <ng-container *ngIf="accountAgency && accountNumber"> · </ng-container>
          <ng-container *ngIf="accountNumber">Conta {{ accountNumber }}</ng-container>
        </span>
      </p>
    </header>

    <!-- SHEET: cabeçalho fixo · chaves scrolláveis · footer fixo -->
    <section class="dep-sheet">
      <div class="dep-sheet-head">
        <h2 class="dep-sheet-title">Suas chaves PIX</h2>
      </div>

      <div class="dep-sheet-scroll" role="region" aria-label="Lista de chaves PIX">
        <p class="dep-error" *ngIf="errorMessage" role="alert">{{ errorMessage }}</p>

        <div class="dep-key-block" *ngFor="let key of pixKeys; let i = index">
          <p class="dep-key-label">Chave PIX #{{ i + 1 }}</p>
          <div class="dep-key-row">
            <button
              type="button"
              class="dep-key-copy tap-highlight-none"
              (click)="copyKey(key.value)"
              [attr.aria-label]="'Copiar chave PIX ' + (i + 1)"
            >
              <span class="dep-key-value">{{ key.value }}</span>
              <ion-icon name="copy-outline" class="dep-key-copy-icon" aria-hidden="true"></ion-icon>
            </button>

            <button
              type="button"
              class="dep-key-delete tap-highlight-none"
              *ngIf="key.id"
              (click)="onDeleteKey(key)"
              [disabled]="deletingKeyId === key.id || creatingPixKey"
              [attr.aria-label]="'Remover chave PIX ' + (i + 1)"
            >
              <ion-spinner *ngIf="deletingKeyId === key.id" name="crescent" class="dep-key-delete-spinner"></ion-spinner>
              <ion-icon *ngIf="deletingKeyId !== key.id" name="trash-outline" aria-hidden="true"></ion-icon>
            </button>
          </div>
        </div>

        <div class="dep-empty-keys" *ngIf="!loading && !errorMessage && pixKeys.length === 0">
          <ion-icon name="key-outline" class="dep-empty-icon" aria-hidden="true"></ion-icon>
          <p>Nenhuma chave PIX cadastrada para esta conta.</p>
        </div>
      </div>
    </section>

    <!-- CTA fixo: irmão de .dep-sheet, nunca é cortado mesmo em telas curtas -->
    <footer class="dep-footer">
      <button
        type="button"
        class="dep-primary-btn tap-highlight-none"
        [disabled]="creatingPixKey || loading || !!deletingKeyId"
        (click)="onCreateNewKey()"
      >
        <ion-spinner *ngIf="creatingPixKey" name="crescent" class="dep-btn-spinner"></ion-spinner>
        <span>{{ creatingPixKey ? 'Criando…' : 'Criar nova chave PIX' }}</span>
      </button>
    </footer>
  </div>
</ion-content>
