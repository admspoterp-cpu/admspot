<ion-content [fullscreen]="true" class="qr-scan-content" [forceOverscroll]="false">
  <div class="scan-page">
    <header class="scan-header">
      <button type="button" class="back-btn" (click)="goBack()" aria-label="Voltar">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </button>
      <h1>Ler QR Code</h1>
    </header>

    <section class="camera-stage">
      <video #videoElement autoplay playsinline muted></video>
      <div class="scan-frame">
        <span class="corner corner-tl"></span>
        <span class="corner corner-tr"></span>
        <span class="corner corner-bl"></span>
        <span class="corner corner-br"></span>
      </div>
    </section>

    <section class="scan-status">
      <p class="status-message">{{ statusMessage }}</p>
      <p class="code" *ngIf="detectedCode">Codigo: {{ detectedCode }}</p>

      <ion-button expand="block" class="retry-btn" *ngIf="!cameraAllowed" (click)="requestCameraAccess()">
        Permitir camera
      </ion-button>

      <ion-button
        expand="block"
        class="retry-btn"
        *ngIf="uploadState === 'success' || uploadState === 'error'"
        (click)="restartScanner()"
      >
        Ler outro QR
      </ion-button>
    </section>
  </div>
</ion-content>
